<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy 26th Anniversary — Aai & Baba 🤍</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Jost:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cream: #fdf8f2;
    --warm: #f5ede0;
    --envelope: #ecdcc8;
    --flap: #d9c5ac;
    --seal: #b87a62;
    --text: #2c221a;
    --muted: #7a6558;
    --border: #d9c5ac;
    --accent: #b87a62;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Jost', sans-serif;
    background: var(--cream);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 3rem 1.5rem 5rem;
  }

  /* --- hero --- */
  .hero {
    text-align: center;
    margin-bottom: 3rem;
  }

  .hero-label {
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.75rem;
  }

  .hero-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(2.4rem, 7vw, 4rem);
    font-weight: 400;
    line-height: 1.15;
    color: var(--text);
  }

  .hero-title em {
    font-style: italic;
    color: var(--accent);
  }

  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    justify-content: center;
    margin: 1.2rem 0;
    color: var(--accent);
    font-size: 13px;
    letter-spacing: 6px;
  }

  .divider::before,
  .divider::after {
    content: '';
    height: 1px;
    width: 60px;
    background: linear-gradient(to right, transparent, var(--border));
  }
  .divider::after { background: linear-gradient(to left, transparent, var(--border)); }

  /* --- photo --- */
  .photo-frame {
    margin: 0 auto 3rem;
    width: clamp(220px, 70vw, 360px);
    border-radius: 16px;
    overflow: hidden;
    border: 4px solid var(--flap);
    box-shadow: 0 0 0 8px var(--warm), 0 0 0 9px var(--border);
    position: relative;
  }

  .photo-frame img {
    width: 100%;
    height: auto;
    display: block;
  }

  /* --- envelope scene --- */
  .scene {
    position: relative;
    width: 320px;
    height: 210px;
    margin: 0 auto;
    cursor: pointer;
    perspective: 900px;
  }


  /* ── envelope outer shell (clips letter-peek until open) ── */
  .envelope-wrap {
    position: absolute;
    inset: 0;
    z-index: 3;
    overflow: hidden;
    border-radius: 4px;
    perspective: 900px;
  }

  .scene.open .envelope-wrap { overflow: visible; }

  /* base rectangle – warm tan */
  .env-body {
    position: absolute;
    inset: 0;
    background: #d4b896;
    border-radius: 4px;
    border: 1.5px solid #b89468;
  }

  /* bottom V fold */
  .env-bottom {
    position: absolute;
    bottom: -1px; left: -1px; right: -1px;
    height: 0;
    border-left: 161px solid transparent;
    border-right: 161px solid transparent;
    border-bottom: 110px solid #c4a47e;
    z-index: 4;
  }

  /* left diagonal fold */
  .env-side-left {
    position: absolute;
    top: -1px; left: -1px;
    width: 0; height: 0;
    border-top: 106px solid transparent;
    border-bottom: 106px solid transparent;
    border-left: 125px solid #bea080;
    z-index: 4;
  }

  /* right diagonal fold */
  .env-side-right {
    position: absolute;
    top: -1px; right: -1px;
    width: 0; height: 0;
    border-top: 106px solid transparent;
    border-bottom: 106px solid transparent;
    border-right: 125px solid #bea080;
    z-index: 4;
  }

  /* ── flap: separate layer, rotates open upward ── */
  .env-flap {
    position: absolute;
    top: -1px; left: -1px;
    width: 322px;
    transform-origin: top center;
    transform-style: preserve-3d;
    transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    z-index: 5;
  }

  /* flap triangle pointing down (closed position = V on front) */
  .env-flap-shape {
    width: 0; height: 0;
    border-left: 161px solid transparent;
    border-right: 161px solid transparent;
    border-top: 122px solid #c4a47e;
  }

  /* slightly lighter inner face shown when flap rotates back */
  .env-flap-shape::before {
    content: '';
    position: absolute;
    top: -124px; left: -163px;
    width: 0; height: 0;
    border-left: 163px solid transparent;
    border-right: 163px solid transparent;
    border-top: 120px solid #cdb48a;
  }

  .scene.open .env-flap {
    transform: rotateX(-180deg);
  }

  /* seal sits at flap point */
  .env-seal {
    position: absolute; top: 48px; left: 50%;
    transform: translateX(-50%);
    width: 38px; height: 38px;
    background: var(--seal);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; z-index: 8;
    border: 2px solid #9a6048;
    transition: opacity 0.2s 0.5s;
  }

  .scene.open .env-seal { opacity: 0; pointer-events: none; }

  .open-hint {
    position: absolute; bottom: -28px; left: 50%;
    transform: translateX(-50%);
    font-size: 12px; font-weight: 300;
    color: var(--muted); white-space: nowrap;
    letter-spacing: 0.08em;
    transition: opacity 0.3s;
  }

  .scene.open .open-hint { opacity: 0; }

  /* --- full letter below (fades in after slide) --- */
  .letter-wrap {
    margin-top: 1.5rem;
    width: 100%;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.7s ease;
  }

  .letter-wrap.visible {
    opacity: 1;
    pointer-events: all;
  }

  .letter-card {
    background: #fffdf8;
    border: 1px solid #e5d4be;
    border-radius: 12px;
    padding: 2.5rem 2.2rem 1.8rem;
    position: relative;
  }

  .letter-card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 3px;
    border-radius: 12px 12px 0 0;
    background: linear-gradient(90deg, var(--seal), #e8a88e, var(--seal));
    opacity: 0.65;
  }

  .letter-date {
    font-size: 12px; letter-spacing: 0.06em;
    color: var(--muted); margin-bottom: 1.5rem;
    font-weight: 300;
  }

  .letter-body {
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px; line-height: 1.9;
    color: var(--text);
    white-space: pre-wrap;
  }

  .letter-sig {
    margin-top: 1.8rem;
    font-family: 'Cormorant Garamond', serif;
    font-size: 17px;
    color: var(--muted);
    text-align: right;
  }

  /* --- tts bar --- */
  .tts-bar {
    margin-top: 1.5rem;
    display: flex; align-items: center; flex-wrap: wrap; gap: 10px;
    padding-top: 1.2rem;
    border-top: 1px solid var(--border);
  }

  .tts-btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 7px 16px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text);
    font-family: 'Jost', sans-serif;
    font-size: 13px; font-weight: 300;
    cursor: pointer; letter-spacing: 0.04em;
    transition: background 0.15s, border-color 0.15s;
  }

  .tts-btn:hover { background: var(--warm); border-color: var(--flap); }
  .tts-btn:active { transform: scale(0.97); }
  .tts-btn svg { width: 13px; height: 13px; flex-shrink: 0; }

  .speed-label { font-size: 12px; color: var(--muted); margin-left: auto; font-weight: 300; }

  .speed-select {
    font-size: 12px; padding: 5px 8px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: #fffdf8; color: var(--text);
    font-family: 'Jost', sans-serif;
    cursor: pointer;
  }

  .tts-status { font-size: 12px; color: var(--muted); }

  .dot-pulse {
    display: inline-block; width: 6px; height: 6px;
    border-radius: 50%; background: var(--accent);
    margin-right: 4px; animation: pulse 1s infinite; vertical-align: middle;
  }

  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.7)} }

  /* footer */
  .footer {
    margin-top: 4rem;
    font-size: 12px; color: var(--muted); letter-spacing: 0.06em;
    font-weight: 300;
  }
</style>
</head>
<body>

<div class="hero">
  <p class="hero-label">A letter from Thaku</p>
  <h1 class="hero-title">Happy <em>26th</em> Anniversary</h1>
  <div class="divider">♥ ♥ ♥</div>
</div>

<div class="stage">
  <!-- scene: letter-peek + envelope layered together -->
  <div class="scene" id="scene" onclick="openEnvelope()">
    <!-- letter paper sitting inside envelope, will slide up -->
    <!-- envelope -->
    <div class="envelope-wrap">
      <div class="env-body"></div>
      <div class="env-bottom"></div>
      <div class="env-side-left"></div>
      <div class="env-side-right"></div>
      <div class="env-flap"><div class="env-flap-shape"></div></div>
      <div class="env-seal">♥</div>
      <span class="open-hint">✦ Click to open ✦</span>
    </div>
  </div>

  <!-- full letter fades in below after animation -->
  <div class="letter-wrap" id="letterWrap">
    <div class="letter-card">
      <p class="letter-date" id="letterDate"></p>
      <div class="letter-body" id="letterBody"></div>
      <div class="letter-sig">— Thaku 🤍</div>

      <div class="tts-bar">
        <button class="tts-btn" id="playBtn" onclick="toggleSpeech()">
          <svg viewBox="0 0 16 16" fill="currentColor"><polygon points="3,2 13,8 3,14"/></svg>
          Read aloud
        </button>
        <button class="tts-btn" onclick="stopSpeech()">
          <svg viewBox="0 0 16 16" fill="currentColor"><rect x="3" y="3" width="10" height="10" rx="1"/></svg>
          Stop
        </button>
        <span class="speed-label">Speed</span>
        <select class="speed-select" id="speedSelect" onchange="updateSpeed()">
          <option value="0.75">0.75×</option>
          <option value="1" selected>1×</option>
          <option value="1.25">1.25×</option>
          <option value="1.5">1.5×</option>
        </select>
        <span class="tts-status" id="ttsStatus"></span>
      </div>
    </div>
  </div>
</div>

<p class="footer">with love ♥ always</p>

<script>
const LETTER_TEXT = `Happy anniversary Aai and Baba — 26 years, wow. I could never (joke, sorry 😭).

I've never really said this, and you probably didn't realize the impact, but I got a glimpse of what genuine, committed partnership looks like — especially through the most uncertain and testing times. I'm really grateful I got to witness that firsthand.

Baba, you've been the best father and husband with everything God has given you.

Mumma, you've been my whole world and my safe place.

At the end of the day, everything I do is to make you proud. I just hope God is kind enough to give you both the lives you truly deserve.

God bless you both. Love you 🤍`;

const TTS_TEXT = `Happy anniversary Aai and Baba — 26 years, wow. I could never... joke, sorry.

I've never really said this, and you probably didn't realize the impact, but I got a glimpse of what genuine, committed partnership looks like — especially through the most uncertain and testing times. I'm really grateful I got to witness that firsthand.

Baba, you've been the best father and husband with everything God has given you.

Mumma, you've been my whole world and my safe place.

At the end of the day, everything I do is to make you proud. I just hope God is kind enough to give you both the lives you truly deserve.

God bless you both. Love you. — Thaku`;

document.getElementById('letterDate').textContent = new Date().toLocaleDateString('en-IN', { day: 'numeric', month: 'long', year: 'numeric' });
document.getElementById('letterBody').textContent = LETTER_TEXT;

let opened = false, speaking = false, currentSpeed = 1;

function openEnvelope() {
  if (opened) return;
  opened = true;
  const scene = document.getElementById('scene');
  scene.classList.add('open');
  scene.style.cursor = 'default';
  setTimeout(() => document.getElementById('letterWrap').classList.add('visible'), 900);
}

function toggleSpeech() {
  if (speaking) {
    speechSynthesis.pause(); speaking = false;
    setStatus(''); updatePlayBtn(false);
  } else if (speechSynthesis.paused) {
    speechSynthesis.resume(); speaking = true;
    setStatus('<span class="dot-pulse"></span> Reading…'); updatePlayBtn(true);
  } else { startSpeech(); }
}

function startSpeech() {
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(TTS_TEXT);
  u.rate = currentSpeed; u.pitch = 1.05;
  const v = speechSynthesis.getVoices().find(v => v.lang.startsWith('en') && v.localService) || speechSynthesis.getVoices()[0];
  if (v) u.voice = v;
  u.onstart = () => { speaking = true; setStatus('<span class="dot-pulse"></span> Reading…'); updatePlayBtn(true); };
  u.onend = () => { speaking = false; setStatus('Done ✓'); updatePlayBtn(false); setTimeout(() => setStatus(''), 2500); };
  u.onerror = () => { speaking = false; setStatus(''); updatePlayBtn(false); };
  speechSynthesis.speak(u);
}

function stopSpeech() { speechSynthesis.cancel(); speaking = false; setStatus(''); updatePlayBtn(false); }

function updateSpeed() {
  currentSpeed = parseFloat(document.getElementById('speedSelect').value);
  if (speaking) { stopSpeech(); setTimeout(startSpeech, 100); }
}

function setStatus(html) { document.getElementById('ttsStatus').innerHTML = html; }

function updatePlayBtn(p) {
  document.getElementById('playBtn').innerHTML = p
    ? `<svg viewBox="0 0 16 16" fill="currentColor" style="width:13px;height:13px"><rect x="3" y="2" width="4" height="12" rx="1"/><rect x="9" y="2" width="4" height="12" rx="1"/></svg> Pause`
    : `<svg viewBox="0 0 16 16" fill="currentColor" style="width:13px;height:13px"><polygon points="3,2 13,8 3,14"/></svg> Read aloud`;
}
</script>
</body>
